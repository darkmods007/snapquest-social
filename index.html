<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SnapQuest - Réseau Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #f8fafc; }
        /* Scrollbar pour les commentaires */
        .comments-scroll::-webkit-scrollbar { width: 4px; }
        .comments-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        const API_URL = '';
        
        function App() {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [isLogin, setIsLogin] = React.useState(true);
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [fullName, setFullName] = React.useState('');
            const [error, setError] = React.useState('');
            const [sending, setSending] = React.useState(false);
            const [photos, setPhotos] = React.useState([]);
            const [moderators, setModerators] = React.useState([]);
            const [users, setUsers] = React.useState([]);
            const [selectedFile, setSelectedFile] = React.useState(null);
            const [caption, setCaption] = React.useState('');
            const [preview, setPreview] = React.useState(null);
            const [uploading, setUploading] = React.useState(false);
            const [activeTab, setActiveTab] = React.useState('upload');
            const [selectedUserIdToPromote, setSelectedUserIdToPromote] = React.useState('');
            const [loadingPhotos, setLoadingPhotos] = React.useState(false);
            
            // État pour gérer les textes de commentaires en cours de saisie
            const [commentInputs, setCommentInputs] = React.useState({});
            
            React.useEffect(() => {
                fetch('/api/me', { credentials: 'include' })
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.id) {
                            setUser(data);
                            if (data.role === 'admin') fetchUsers();
                            fetchPhotos();
                        }
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);
            
            const fetchPhotos = async () => {
                setLoadingPhotos(true);
                try {
                    const res = await fetch('/api/photos', { credentials: 'include' });
                    if (res.status === 401) { setUser(null); return; }
                    const data = await res.json();
                    setPhotos(data || []);
                } catch(e) { console.error(e); }
                finally { setLoadingPhotos(false); }
            };
            
            const fetchUsers = async () => {
                try {
                    const res = await fetch('/api/users', { credentials: 'include' });
                    if (res.status === 401 || res.status === 403) return;
                    const data = await res.json();
                    setUsers(data || []);
                    setModerators((data || []).filter(u => u.role === 'moderator'));
                } catch(e) { console.error(e); }
            };
            
            const handleRegister = async () => {
                if (!username || !password) return;
                setSending(true);
                setError('');
                try {
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password, full_name: fullName || username }),
                        credentials: 'include'
                    });
                    const data = await res.json();
                    if (data.user) {
                        setUser(data.user);
                        if (data.user.role === 'admin') fetchUsers();
                        fetchPhotos();
                    } else { setError(data.error || 'Erreur'); }
                } catch(e) { setError('Erreur réseau'); }
                finally { setSending(false); }
            };
            
            const handleLogin = async () => {
                if (!username || !password) return;
                setSending(true);
                setError('');
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password }),
                        credentials: 'include'
                    });
                    const data = await res.json();
                    if (data.user) {
                        setUser(data.user);
                        if (data.user.role === 'admin') fetchUsers();
                        fetchPhotos();
                    } else { setError(data.error || 'Identifiants invalides'); }
                } catch(e) { setError('Erreur réseau'); }
                finally { setSending(false); }
            };
            
            const logout = async () => {
                await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
                setUser(null);
                setPhotos([]);
                setUsers([]);
                setModerators([]);
                setActiveTab('upload');
            };
            
            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setSelectedFile(file);
                    const reader = new FileReader();
                    reader.onloadend = () => setPreview(reader.result);
                    reader.readAsDataURL(file);
                }
            };
            
            const handleUpload = async () => {
                if (!selectedFile) return;
                setUploading(true);
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('caption', caption);
                try {
                    const res = await fetch('/api/photos', { method: 'POST', body: formData, credentials: 'include' });
                    if (res.status === 401) return;
                    const data = await res.json();
                    if (data.id) {
                        setSelectedFile(null);
                        setPreview(null);
                        setCaption('');
                        fetchPhotos();
                        setActiveTab('gallery');
                    }
                } catch(e) { alert('Erreur réseau'); }
                finally { setUploading(false); }
            };
            
            const deletePhoto = async (id) => {
                if (!confirm('Supprimer cette photo ?')) return;
                await fetch('/api/photos/' + id, { method: 'DELETE', credentials: 'include' });
                fetchPhotos();
            };

            // NOUVEAU : Fonction J'aime
            const toggleLike = async (id) => {
                // Optimisation visuelle (mise à jour immédiate avant la réponse du serveur)
                setPhotos(photos.map(p => {
                    if (p.id === id) {
                        return { ...p, isLikedByMe: !p.isLikedByMe, likesCount: p.isLikedByMe ? p.likesCount - 1 : p.likesCount + 1 };
                    }
                    return p;
                }));
                await fetch('/api/photos/' + id + '/like', { method: 'POST', credentials: 'include' });
            };

            // NOUVEAU : Fonction Commentaire
            const submitComment = async (photoId) => {
                const text = commentInputs[photoId];
                if (!text || text.trim() === '') return;
                
                await fetch('/api/photos/' + photoId + '/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text }),
                    credentials: 'include'
                });
                
                setCommentInputs({ ...commentInputs, [photoId]: '' }); // Vider le champ
                fetchPhotos(); // Recharger pour voir le commentaire
            };
            
            const addModerator = async () => {
                if (!selectedUserIdToPromote) return;
                setSending(true);
                await fetch('/api/users/' + selectedUserIdToPromote + '/role', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: 'moderator' }),
                    credentials: 'include'
                });
                setSelectedUserIdToPromote('');
                fetchUsers();
                setSending(false);
            };
            
            const removeModerator = async (id) => {
                if (!confirm('Retirer ce modérateur ?')) return;
                await fetch('/api/users/' + id + '/role', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: 'user' }),
                    credentials: 'include'
                });
                fetchUsers();
            };
            
            const isAdmin = user?.role === 'admin';
            const isModOrAdmin = isAdmin || user?.role === 'moderator';
            const regularUsers = users.filter(u => u.role === 'user');
            
            if (loading) {
                return React.createElement('div', { className: 'min-h-screen flex items-center justify-center' },
                    React.createElement('div', { className: 'w-8 h-8 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin' })
                );
            }
            
            if (!user) {
                // (Même code de connexion qu'avant)
                return React.createElement('div', { className: 'min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-purple-50 to-slate-100' },
                    React.createElement('div', { className: 'max-w-md w-full bg-white rounded-2xl shadow-xl border border-purple-100 p-8' },
                        React.createElement('div', { className: 'text-center mb-8' },
                            React.createElement('div', { className: 'w-16 h-16 rounded-2xl bg-purple-600 flex items-center justify-center mx-auto mb-4' },
                                React.createElement('svg', { className: 'w-8 h-8 text-white', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z' }),
                                    React.createElement('circle', { cx: '12', cy: '13', r: '3' })
                                )
                            ),
                            React.createElement('h1', { className: 'text-2xl font-bold text-slate-800' }, 'SnapQuest'),
                            React.createElement('p', { className: 'text-slate-500 text-sm mt-1' }, isLogin ? 'Connecte-toi' : 'Crée un compte')
                        ),
                        React.createElement('div', { className: 'space-y-4' },
                            React.createElement('input', { type: 'text', placeholder: 'Nom d\'utilisateur', value: username, onChange: (e) => setUsername(e.target.value), className: 'w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500' }),
                            React.createElement('input', { type: 'password', placeholder: 'Mot de passe', value: password, onChange: (e) => setPassword(e.target.value), className: 'w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500' }),
                            !isLogin && React.createElement('input', { type: 'text', placeholder: 'Nom complet (optionnel)', value: fullName, onChange: (e) => setFullName(e.target.value), className: 'w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500' }),
                            React.createElement('button', { onClick: isLogin ? handleLogin : handleRegister, disabled: !username || !password || sending, className: `w-full py-3 rounded-xl font-semibold transition ${!username || !password || sending ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-purple-600 text-white hover:bg-purple-700'}` }, sending ? 'Chargement...' : (isLogin ? 'Se connecter' : 'S\'inscrire')),
                            React.createElement('button', { onClick: () => { setIsLogin(!isLogin); setError(''); setUsername(''); setPassword(''); }, className: 'w-full text-sm text-purple-600 hover:text-purple-700' }, isLogin ? 'Créer un compte' : 'Déjà un compte ? Se connecter'),
                            error && React.createElement('p', { className: 'text-red-500 text-sm text-center' }, error)
                        )
                    )
                );
            }
            
            return React.createElement('div', { className: 'min-h-screen flex flex-col bg-gradient-to-br from-slate-50 to-slate-100' },
                React.createElement('header', { className: 'sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-slate-200' },
                    React.createElement('div', { className: 'max-w-6xl mx-auto px-4 h-16 flex items-center justify-between' },
                        React.createElement('div', { className: 'flex items-center gap-2 cursor-pointer', onClick: () => setActiveTab('gallery') },
                            React.createElement('div', { className: 'w-9 h-9 rounded-xl bg-purple-600 flex items-center justify-center' },
                                React.createElement('svg', { className: 'w-5 h-5 text-white', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z' }),
                                    React.createElement('circle', { cx: '12', cy: '13', r: '3' })
                                )
                            ),
                            React.createElement('span', { className: 'font-bold text-xl tracking-tight text-slate-800' }, 'SnapQuest')
                        ),
                        React.createElement('div', { className: 'flex items-center gap-3' },
                            React.createElement('span', { className: 'text-sm font-medium text-slate-600 hidden sm:inline' }, user?.full_name || user?.username),
                            React.createElement('button', { onClick: logout, className: 'text-sm text-red-500 hover:text-red-600' }, 'Déconnexion')
                        )
                    )
                ),
                React.createElement('div', { className: 'border-b border-slate-200 bg-white/50' },
                    React.createElement('div', { className: 'max-w-6xl mx-auto px-4 flex gap-1' },
                        React.createElement('button', { onClick: () => setActiveTab('upload'), className: `px-4 py-3 text-sm font-medium transition ${activeTab === 'upload' ? 'text-purple-600 border-b-2 border-purple-600' : 'text-slate-500 hover:text-slate-700'}` }, 'Nouvelle Photo'),
                        React.createElement('button', { onClick: () => setActiveTab('gallery'), className: `px-4 py-3 text-sm font-medium transition ${activeTab === 'gallery' ? 'text-purple-600 border-b-2 border-purple-600' : 'text-slate-500 hover:text-slate-700'}` }, 'Fil d\'actualité'),
                        isModOrAdmin && React.createElement('button', { onClick: () => setActiveTab('admin'), className: `px-4 py-3 text-sm font-medium transition ${activeTab === 'admin' ? 'text-purple-600 border-b-2 border-purple-600' : 'text-slate-500 hover:text-slate-700'}` }, 'Admin')
                    )
                ),
                React.createElement('main', { className: 'flex-1 max-w-6xl mx-auto px-4 py-8 w-full' },
                    
                    // ONGLETS UPLOAD ET ADMIN (inchangés)
                    activeTab === 'upload' && React.createElement('div', { className: 'max-w-md mx-auto' },
                        React.createElement('div', { className: 'bg-white rounded-2xl shadow-sm border border-slate-200 p-6' },
                            !preview ? React.createElement('div', { onClick: () => document.getElementById('file-input').click(), className: 'aspect-square rounded-xl border-2 border-dashed border-purple-300 bg-purple-50/50 flex flex-col items-center justify-center cursor-pointer hover:bg-purple-100 transition' },
                                React.createElement('svg', { className: 'w-12 h-12 text-purple-400 mb-3', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z' })
                                ),
                                React.createElement('p', { className: 'text-purple-600 font-medium' }, 'Choisis ta photo'),
                                React.createElement('p', { className: 'text-xs text-slate-400 mt-1' }, 'JPG, PNG, 10 Mo max')
                            ) : React.createElement('div', { className: 'space-y-4' },
                                React.createElement('img', { src: preview, className: 'w-full aspect-square object-cover rounded-xl' }),
                                React.createElement('button', { onClick: () => { setSelectedFile(null); setPreview(null); }, className: 'text-sm text-red-500 hover:text-red-600' }, 'Changer d\'image')
                            ),
                            React.createElement('input', { id: 'file-input', type: 'file', accept: 'image/*', className: 'hidden', onChange: handleFileChange }),
                            React.createElement('textarea', { placeholder: 'Ajoute une légende...', value: caption, onChange: (e) => setCaption(e.target.value), className: 'w-full mt-4 px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 resize-none', rows: '2' }),
                            React.createElement('button', { onClick: handleUpload, disabled: !selectedFile || uploading, className: `w-full mt-4 py-2.5 rounded-xl font-medium transition ${!selectedFile || uploading ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-purple-600 text-white hover:bg-purple-700'}` }, uploading ? 'Publication en cours...' : 'Publier')
                        )
                    ),
                    
                    // ONGLET FIL D'ACTUALITÉ (Modifié pour Likes et Commentaires)
                    activeTab === 'gallery' && React.createElement('div', { className: 'max-w-2xl mx-auto' }, // Centré style Facebook/Instagram
                        loadingPhotos ? React.createElement('div', { className: 'text-center py-20' }, React.createElement('div', { className: 'w-8 h-8 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin mx-auto' })) :
                        photos.length === 0 ? React.createElement('div', { className: 'text-center py-20' },
                            React.createElement('div', { className: 'w-20 h-20 rounded-full bg-purple-100 flex items-center justify-center mx-auto mb-4' },
                                React.createElement('svg', { className: 'w-10 h-10 text-purple-400', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                    React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z' })
                                )
                            ),
                            React.createElement('p', { className: 'text-slate-500 text-lg' }, 'Aucune publication pour le moment')
                        ) : React.createElement('div', { className: 'space-y-8' }, photos.map(photo => {
                            const canDelete = isModOrAdmin || photo.user_id === user.id;
                            
                            return React.createElement('div', { key: photo.id, className: 'bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden' },
                                
                                // En-tête de la publication
                                React.createElement('div', { className: 'p-4 flex items-center justify-between' },
                                    React.createElement('div', { className: 'flex items-center gap-3' },
                                        React.createElement('div', { className: 'w-10 h-10 rounded-full bg-gradient-to-tr from-purple-500 to-pink-500 flex items-center justify-center text-white font-bold' },
                                            (photo.user_name || 'A')[0].toUpperCase()
                                        ),
                                        React.createElement('div', null,
                                            React.createElement('p', { className: 'font-bold text-slate-800 text-sm' }, photo.user_name || 'Anonyme'),
                                            React.createElement('p', { className: 'text-xs text-slate-400' }, new Date(photo.created_date).toLocaleString('fr-FR'))
                                        )
                                    ),
                                    canDelete && React.createElement('button', { onClick: () => deletePhoto(photo.id), className: 'text-slate-400 hover:text-red-500 transition' },
                                        React.createElement('svg', { className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                            React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16' })
                                        )
                                    )
                                ),
                                
                                // Image
                                React.createElement('div', { className: 'bg-slate-50' },
                                    React.createElement('img', { src: photo.image_url, alt: photo.caption, className: 'w-full max-h-[600px] object-contain' })
                                ),
                                
                                // Actions (Like, Commentaire)
                                React.createElement('div', { className: 'p-4' },
                                    React.createElement('div', { className: 'flex items-center gap-4 mb-3' },
                                        React.createElement('button', { onClick: () => toggleLike(photo.id), className: `flex items-center gap-1.5 transition ${photo.isLikedByMe ? 'text-red-500' : 'text-slate-600 hover:text-slate-800'}` },
                                            React.createElement('svg', { className: 'w-7 h-7', fill: photo.isLikedByMe ? 'currentColor' : 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                                React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z' })
                                            ),
                                            React.createElement('span', { className: 'font-semibold text-sm' }, photo.likesCount)
                                        ),
                                        React.createElement('div', { className: 'flex items-center gap-1.5 text-slate-600' },
                                            React.createElement('svg', { className: 'w-7 h-7', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24' },
                                                React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z' })
                                            ),
                                            React.createElement('span', { className: 'font-semibold text-sm' }, photo.comments?.length || 0)
                                        )
                                    ),
                                    
                                    // Légende
                                    photo.caption && React.createElement('div', { className: 'mb-4' },
                                        React.createElement('span', { className: 'font-bold text-slate-800 mr-2 text-sm' }, photo.user_name),
                                        React.createElement('span', { className: 'text-slate-700 text-sm' }, photo.caption)
                                    ),
                                    
                                    // Liste des commentaires
                                    photo.comments && photo.comments.length > 0 && React.createElement('div', { className: 'space-y-1 mb-4 max-h-32 overflow-y-auto comments-scroll pr-2' },
                                        photo.comments.map(c => 
                                            React.createElement('div', { key: c.id, className: 'text-sm' },
                                                React.createElement('span', { className: 'font-bold text-slate-800 mr-2' }, c.user_name),
                                                React.createElement('span', { className: 'text-slate-600' }, c.text)
                                            )
                                        )
                                    ),
                                    
                                    // Ajouter un commentaire
                                    React.createElement('div', { className: 'flex items-center gap-2 mt-2 pt-3 border-t border-slate-100' },
                                        React.createElement('input', { 
                                            type: 'text', 
                                            placeholder: 'Ajouter un commentaire...', 
                                            value: commentInputs[photo.id] || '',
                                            onChange: (e) => setCommentInputs({...commentInputs, [photo.id]: e.target.value}),
                                            onKeyPress: (e) => { if(e.key === 'Enter') submitComment(photo.id); },
                                            className: 'flex-1 text-sm outline-none bg-transparent placeholder-slate-400' 
                                        }),
                                        React.createElement('button', { 
                                            onClick: () => submitComment(photo.id),
                                            disabled: !commentInputs[photo.id] || commentInputs[photo.id].trim() === '',
                                            className: `text-sm font-semibold transition ${(commentInputs[photo.id] || '').trim() !== '' ? 'text-purple-600 hover:text-purple-800' : 'text-purple-300'}` 
                                        }, 'Publier')
                                    )
                                )
                            )
                        }))
                    ),
                    
                    // ONGLET ADMIN
                    activeTab === 'admin' && isModOrAdmin && React.createElement('div', { className: 'max-w-2xl mx-auto bg-white rounded-2xl border border-slate-200 p-6' },
